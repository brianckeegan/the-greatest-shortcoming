<!doctype html>
<html lang="{{ site.lang | default: 'en' }}">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% if page.title %}{{ page.title }} — {% endif %}{{ site.title }}{% if site.subtitle %} — {{ site.subtitle }}{% endif %}</title>
  <meta name="description" content="{{ page.description | default: site.description | strip_newlines }}" />
  {%- seo title=false -%}

  <link rel="stylesheet" href="{{ '/assets/css/scrolly.css' | relative_url }}" />

  <!-- React + Babel (pinned, with integrity) -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <!-- Site data injected from Jekyll _data/*.yml — consumed by app.jsx -->
  {% include site-data.html %}

  <script type="text/babel" src="{{ '/assets/js/tweaks-panel.jsx' | relative_url }}"></script>
  <script type="text/babel" src="{{ '/assets/js/scrolly-network.jsx' | relative_url }}"></script>

  {% include head-extra.html %}
</head>
<body>
  {{ content }}

  <div class="footer">
    <span>{{ site.footer.left }}</span>
    <span>{{ site.footer.right }}</span>
  </div>
</body>
</html>
