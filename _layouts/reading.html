<!doctype html>
<html lang="{{ site.lang | default: 'en' }}" data-surface="reading">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% if page.title %}{{ page.title }} — {% endif %}{{ site.title }}{% if site.subtitle %} — {{ site.subtitle }}{% endif %}</title>
  <meta name="description" content="{{ page.description | default: site.description | strip_newlines }}" />
  {%- seo title=false -%}

  <link rel="stylesheet" href="{{ '/assets/css/scrolly.css' | relative_url }}" />

  <!-- React + Babel (pinned, with integrity) -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <!-- Site data injected from Jekyll _data/*.yml — consumed by app.jsx -->
  {% include site-data.html %}

  <script type="text/babel" src="{{ '/assets/js/tweaks-panel.jsx' | relative_url }}"></script>
  <script type="text/babel" src="{{ '/assets/js/scrolly-network.jsx' | relative_url }}"></script>

  {% include head-extra.html %}
</head>
<body>
  <div id="root"></div>

  <!-- Static fallback content (no-JS / SEO). Mirrors the React render. -->
  <noscript>
    <div class="noscript-fallback" style="max-width: 720px; margin: 80px auto; padding: 0 24px; font-family: Georgia, serif; line-height: 1.7;">
      <h1 style="font-size: 48px; line-height: 1; margin: 0 0 16px;">{{ site.hero.title_lines | join: ' ' }}</h1>
      <p style="color: #666; font-style: italic;">{{ site.subtitle }}</p>
      <p>{{ site.hero.deck }}</p>
      {% for era in site.data.eras %}
        <hr style="border: none; border-top: 1px solid #ddd; margin: 32px 0;" />
        <div style="font-family: monospace; font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; color: #888;">{{ era.num }} · {{ era.kicker }}</div>
        <h2 style="font-size: 32px; margin: 8px 0 4px;">{{ era.title }}</h2>
        <div style="color: #999; font-family: monospace; font-size: 12px;">{{ era.subtitle }}</div>
        <div>{{ site.data.prose[era.id] | replace: '{{ DOC:', '<!--DOC:' | replace: '{{ QUOTE:', '<!--QUOTE:' | replace: '}}', '-->' }}</div>
      {% endfor %}
      <p style="margin-top: 48px;"><a href="{{ '/' | relative_url }}">← Back to the book site</a></p>
    </div>
  </noscript>

  <script type="text/babel" src="{{ '/assets/js/app.jsx' | relative_url }}"></script>

  <div class="footer">
    <span>{{ site.footer.left }}</span>
    <span>{{ site.footer.right }}</span>
  </div>
</body>
</html>
