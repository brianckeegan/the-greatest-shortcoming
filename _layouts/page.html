---
layout: default
---
<article>
  <header class="mb-10">
    {% if page.kicker %}<p class="kicker">{{ page.kicker }}</p>{% endif %}
    <h1 class="mt-3 font-display text-5xl font-light leading-tight text-ink md:text-6xl">{{ page.title }}</h1>
    {% if page.subtitle %}<p class="mt-4 font-display text-2xl font-light italic text-mist">{{ page.subtitle }}</p>{% endif %}
  </header>
  <div class="prose prose-stone prose-lg max-w-none">
    {{ content }}
  </div>
</article>
