{%- comment -%}
  Site footer used by the default and chapter layouts. The homepage renders its
  own bespoke footer inline.
{%- endcomment -%}
<footer class="border-t border-clay/40 bg-canvas">
  <div class="mx-auto flex max-w-7xl flex-wrap items-end justify-between gap-6 px-6 py-12 lg:px-8">
    <div>
      <p class="font-display text-xl italic font-light text-ink">{{ site.title }}</p>
      <p class="mt-1 text-sm text-mist">{{ site.footer.left | default: site.subtitle }}</p>
    </div>
    <a class="btn-outline" href="{{ '/' | relative_url }}">Back to the book ↑</a>
  </div>
</footer>
