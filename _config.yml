# ============================================================================
# greatest-shortcoming · landing site + scrollytelling reading
# ============================================================================
# Two surfaces in one repo:
#   /                    — the spec'd promotional landing site for the book
#   /reading/boulder/    — the React scrollytelling reading of chapter 1
# Both share fonts, color tokens (assets/css/scrolly.css → _sass/tgs.scss).
#
# Edit this file to retitle, recolor, and rewire. Add chapters in
# _data/chapters.yml. Add network entities under _data/{people,orgs,...}.yml.

# ---- Site identity ---------------------------------------------------------
title: "The Greatest Shortcoming"
subtitle: "Quantitative Chauvinism and Ecofascist Imaginaries"
author: "Brian C. Keegan"
description: >-
  How a community abstracts its anxieties about disorder, contamination, and
  change into technical problems subject to "objective" numerical analysis —
  and how those quantitative logics travel from progressive city councils to
  the journals of white nationalists.
url: ""           # e.g. "https://brianckeegan.github.io"
baseurl: ""       # e.g. "/the-greatest-shortcoming" if deploying under a path
lang: en
# To set a custom domain: create a CNAME file at the repo root with the domain
# (e.g. greatestshortcoming.com), then enable HTTPS under Settings → Pages.
status_line: "in progress · drafted through chapter 8"

# ---- Hero (homepage) -------------------------------------------------------
hero:
  title_lines: ["The Greatest", "Shortcoming"]
  deck: >-
    How a community abstracts its anxieties about disorder, contamination, and
    change into technical problems subject to "objective" numerical analysis —
    and how those quantitative logics travel from progressive city councils to
    the journals of white nationalists.
  scroll_cue: "scroll to begin"

# ---- Top-level navigation (landing site) -----------------------------------
# Used by _includes/header.html on every static page. The /reading/ scrollytelling
# uses its own header (in app.jsx) driven by `nav_reading` further down.
nav:
  - { label: "Contents",     url: "/contents/" }
  - { label: "Preface",      url: "/chapters/preface/" }
  - { label: "Reading",      url: "/reading/boulder/" }
  - { label: "About",        url: "/about/" }
  - { label: "News",         url: "/news/" }

# ---- Scrollytelling navigation (used by app.jsx on /reading/ only) ---------
nav_reading:
  - { label: "Eras", kind: "eras-menu" }
  - { label: "Book", url: "#book" }
  - { label: "Author", url: "#author" }
  - { label: "News", url: "#news" }
  - { label: "Resources", url: "#resources" }
  - { label: "← Site", url: "/" }

# ---- Two analytical registers (definition bars beneath the hero) -----------
registers:
  - id: "quant-chauvinism"
    kicker: "epistemic register · i"
    title: "Quantitative Chauvinism"
    body: >-
      <em>n.</em> A political operation: the deployment of numerical
      instruments to foreclose political deliberation by converting contested
      claims into apparent technical necessities. It operates through three
      reinforcing patterns — the <b>will to simplify</b> (compressing complex
      social processes into a single governing metric), the <b>rule of
      expertise</b> (insulating quantified claims from democratic scrutiny
      through credentialed authority), and the <b>politics of inevitability</b>
      (converting conditional projections into mandates that foreclose
      political choice).
  - id: "ecofascist-imaginaries"
    kicker: "political register · ii"
    title: "Ecofascist Imaginaries"
    body: >-
      <em>n.</em> Organized visions of environmental futures that naturalize
      hierarchy and exclusion as ecological necessity. Three constitutive
      features: ecological crisis as the ground for <b>palingenetic
      purification</b> (national rebirth from decadence); demographic content
      given to that contamination (the wrong bodies, the wrong fertility); and
      the <b>coercive sorting of populations</b> authorized as stewardship
      rather than violence. Made durable, in Sheila Jasanoff's terms, through
      the laws, infrastructures, and administrative routines that enact them.

# ---- Coda sections (after the scrollytelling) ------------------------------
# Each becomes an in-page section AND can be expanded as its own page later.
coda:
  - id: "book"
    kicker: "about"
    title: "The Book"
    body: >-
      <i>The Greatest Shortcoming</i> traces a hundred years of American
      demographic and environmental governance — from the Olmsted Report's
      grammar of scarcity to climate triage as administrative routine. It
      identifies the actors who built the instruments, the organizations that
      circulated them, the metaphors that made them persuasive, and the
      political projects they served. And it asks whether measurement can be
      redirected: whether the same quantitative tools that narrowed the circle
      of concern can be rebuilt to widen it.
  - id: "author"
    kicker: "about"
    title: "The Author"
    body: >-
      <span style="color:var(--ink-soft);font-style:italic">↳ Author bio
      placeholder — edit <code>_config.yml</code> to replace.</span>
  - id: "news"
    kicker: "latest"
    title: "News"
    body: ""   # empty signals app.jsx to render the latest items from _data/news.yml
  - id: "resources"
    kicker: "further"
    title: "Resources"
    body: >-
      Selected works referenced in chapter 1: Theodore Porter, <i>Trust in
      Numbers</i>; Alain Desrosières, <i>The Politics of Large Numbers</i>;
      Hannah Arendt, <i>The Origins of Totalitarianism</i>; Matthew Connelly,
      <i>Fatal Misconception</i>; Emily Klancher Merchant, <i>Building the
      Population Bomb</i>; Betsy Hartmann, <i>Reproductive Rights and
      Wrongs</i>; Sheila Jasanoff &amp; Sang-Hyun Kim, <i>Dreamscapes of
      Modernity</i>; Roger Griffin on palingenetic ultranationalism.

# ---- Theme tokens (overridable knobs) --------------------------------------
theme_defaults:
  theme: "cool"      # "warm" | "ivory" | "cool"
  net: "rough"       # "rough" | "clean"
  fontSize: 18

# ---- Footer ----------------------------------------------------------------
footer:
  left:  "The Greatest Shortcoming · ch. 1 Boulder · network reading"
  right: "scroll-driven"

# ---- Jekyll plumbing -------------------------------------------------------
# Compatible with the github-pages gem; no plugins beyond GH Pages allow-list.
plugins:
  - jekyll-seo-tag
  - jekyll-sitemap

permalink: pretty

# ---- Collections -----------------------------------------------------------
# `chapters`: front matter, drafted chapters, and forthcoming stubs at /chapters/<slug>/
# `reading`:  the React scrollytelling readings at /reading/<slug>/
collections:
  chapters:
    output: true
    permalink: /chapters/:path/
  reading:
    output: true
    permalink: /reading/:path/

# Default layouts per scope. Pages at the root pick up `default`; chapter
# collection items use `chapter`; reading items mount the React app.
defaults:
  - scope: { path: "" }
    values:
      layout: "default"
  - scope: { path: "", type: "chapters" }
    values:
      layout: "chapter"
  - scope: { path: "", type: "reading" }
    values:
      layout: "reading"
  - scope: { path: "pages" }
    values:
      layout: "page"

exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - MAINTAINERS.md
  - CLAUDE.md
  - scripts
  - node_modules
  - "*.napkin"
  - "Wireframes.html"
  - "Greatest Shortcoming v1.html"
  - "components.jsx"
  - "pages.jsx"
  - "design-canvas.jsx"
  - "styles.css"
