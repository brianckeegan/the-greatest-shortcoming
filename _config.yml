# ============================================================================
# greatest-shortcoming · scrollytelling book site
# ============================================================================
# One unified design across every page. The homepage and each chapter page
# mount the same React shell at /assets/js/app.jsx; static pages share the
# same chrome rendered as plain HTML. Design tokens live in
# assets/css/scrolly.css → _sass/tgs.scss.
#
# Edit this file to retitle, recolor, and rewire. Add chapters in
# _data/chapters.yml. Add network entities under _data/{people,orgs,...}.yml.

# ---- Site identity ---------------------------------------------------------
title: "The Greatest Shortcoming"
subtitle: "Quantitative Chauvinism and Ecofascist Imaginaries"
author: "Brian C. Keegan"
description: >-
  How a community abstracts its anxieties about disorder, contamination, and
  change into technical problems subject to "objective" numerical analysis —
  and how those quantitative logics travel from progressive city councils to
  the journals of white nationalists.
url: "https://www.thegreatestshortcoming.com"           # e.g. "https://brianckeegan.github.io"
baseurl: ""       # e.g. "/the-greatest-shortcoming" if deploying under a path
lang: en
# To set a custom domain: create a CNAME file at the repo root with the domain
# (e.g. greatestshortcoming.com), then enable HTTPS under Settings → Pages.
status_line: "in progress"

# ---- Hero (homepage) -------------------------------------------------------
hero:
  title_lines: ["The Greatest Shortcoming"]
  deck: >-
    How a community abstracts its anxieties about disorder, contamination, and
    change into technical problems subject to "objective" numerical analysis —
    and how those quantitative logics travel from progressive city councils to
    the journals of white nationalists.
  scroll_cue: "scroll to begin"

# ---- Top-level navigation (static-page header) -----------------------------
# Used by _includes/header.html on /about/, /contents/, /bibliography/, /news/,
# /draft-status/. The React shell on the homepage and chapter pages renders
# its own nav from `nav_reading` further down.
nav:
  - { label: "Contents",     url: "/contents/" }
  - { label: "Preface",      url: "/chapters/preface/" }
  - { label: "About",        url: "/about/" }
  - { label: "News",         url: "/news/" }

# ---- Scrollytelling navigation (used by the React app on home + chapters) --
nav_reading:
  # `kind: parts-menu` renders the navbar dropdown of every part. The `label`
  # field is what the user sees on the menu button — keep it as "Eras" for
  # this site, or rename to "Parts", "Chapters", "Acts", etc.
  - { label: "Eras", kind: "parts-menu" }
  - { label: "Book", url: "#book" }
  - { label: "Author", url: "#author" }
  - { label: "News", url: "#news" }

# ---- Unified sections list -------------------------------------------------
# One list, in render order within each `slot`. `kind` selects the renderer:
#
#   register   → bordered definition bar (used for QC and EFI)
#   coda       → standard prose section (Book, Author, Resources)
#   news       → live news list pulled from _data/news.yml (no body needed)
#   epigraphs  → cumulative scroll-reveal of `items` blockquotes
#
# `slot` selects WHERE in the page flow the section renders:
#
#   pre-stepper   → between the hero and the parts stepper
#   pre-scrolly   → between the stepper and the scrolly figure (frames the parts)
#   post-scrolly  → between the scrolly figure and the bottom block (closes the parts)
#   post-coda     → at the bottom of the page
#
# Section `id` becomes the DOM anchor (e.g. clicking the QC bracket on the
# parts stepper jumps to #quant-chauvinism). Reorder freely; the React app
# rebuilds hero kicker links from sections of kind `register`.
sections:

  - id: "bartlett"
    kind: epigraphs
    slot: pre-stepper
    items:
      - quote: "The greatest shortcoming of the human race is our inability to understand the exponential function."
        cite: "Al Bartlett, 1972"
      - quote: "Immigration is the main driver of population growth in the U.S. … therefore any discussion of sustainability in the U.S. must address the need to reduce or eliminate immigration, both legal and illegal, into the U.S."
        cite: "Al Bartlett"
      - quote: "Anyone who thinks that you can stop population growth to save the environment without reducing immigration is innumerate."
        cite: "Al Bartlett"

  - id: "quant-chauvinism"
    kind: coda
    slot: pre-scrolly
    kicker: "epistemic register · i"
    title: "Quantitative Chauvinism"
    body: >-
      <em>n.</em> A political operation: the deployment of numerical
      instruments to foreclose political deliberation by converting contested
      claims into apparent technical necessities. It operates through three
      reinforcing patterns — the <b>will to simplify</b> (compressing complex
      social processes into a single governing metric), the <b>rule of
      expertise</b> (insulating quantified claims from democratic scrutiny
      through credentialed authority), and the <b>politics of inevitability</b>
      (converting conditional projections into mandates that foreclose
      political choice).

  - id: "ecofascist-imaginaries"
    kind: coda
    slot: post-scrolly
    kicker: "political register · ii"
    title: "Ecofascist Imaginaries"
    body: >-
      <em>n.</em> Organized visions of environmental futures that naturalize
      hierarchy and exclusion as ecological necessity.  ecofascist imaginaries 
      become analytically recognizable through four diagnostic elements: 
      
      Threat objects are the entities cast as sources of ecological and social danger
      — overpopulation, immigrants, racial minorities, fertility decline — and what 
      unifies them is that each is rendered as a demographic category rather than a structural condition. 
      
      Moral warrants are the justificatory frameworks that convert coercive governance into ethical obligation, 
      as when Bartlett's freight-train metaphor positioned collateral harm as the reluctant response of realistic 
      stewards to a physical constraint. 
      
      Action repertoires are the policy instruments these imaginaries authorize, ranging from 
      coercive fertility controls and exclusionary border regimes to family
      separation, managed abandonment, and mass violence presented as defense. 
      
      Aesthetic signatures are the visual, temporal, and affective markers — 
      countdown charts, threshold rhetoric, emergency metaphors, the tutorial register — 
      that train audiences to read deliberation as dangerous delay.
      
      Made durable though imaginaries and the laws, infrastructures, and administrative routines that enact them.

  - id: "book"
    kind: coda
    slot: pre-stepper
    kicker: "about"
    title: "The Book"
    body: >-
      <i>The Greatest Shortcoming</i> traces a hundred years of American
      demographic and environmental governance — from the Olmsted Report's
      grammar of scarcity to climate triage as administrative routine. It
      identifies the actors who built the instruments, the organizations that
      circulated them, the metaphors that made them persuasive, and the
      political projects they served. And it asks whether measurement can be
      redirected: whether the same quantitative tools that narrowed the circle
      of concern can be rebuilt to widen it.

  - id: "author"
    kind: coda
    slot: pre-stepper
    kicker: "about"
    title: "The Author"
    body: >-
      Brian C. Keegan, Ph.D. is a computational social scientist and an associate
      professor of information science at the University of Colorado Boulder.
      He received undergraduate degrees from MIT, M.A. and Ph.D. degrees from
      Northwestern University's School of Communication, and completed post-doctoral
      training at Northeastern University and the Harvard Business School. He
      currently resides in Boulder, Colorado with his wife and two sons.

  - id: "news"
    kind: news
    slot: post-coda
    kicker: "latest"
    title: "News"

  - id: "resources"
    kind: coda
    slot: post-coda
    kicker: "further"
    title: "Resources"
    body: >-
      Selected works referenced in chapter 1: Theodore Porter, <i>Trust in
      Numbers</i>; Alain Desrosières, <i>The Politics of Large Numbers</i>;
      Hannah Arendt, <i>The Origins of Totalitarianism</i>; Matthew Connelly,
      <i>Fatal Misconception</i>; Emily Klancher Merchant, <i>Building the
      Population Bomb</i>; Betsy Hartmann, <i>Reproductive Rights and
      Wrongs</i>; Sheila Jasanoff &amp; Sang-Hyun Kim, <i>Dreamscapes of
      Modernity</i>; Roger Griffin on palingenetic ultranationalism.

# ---- Theme tokens (overridable knobs) --------------------------------------
theme_defaults:
  theme: "cool"      # "warm" | "ivory" | "cool"
  net: "rough"       # "rough" | "clean"
  fontSize: 20

# ---- Footer ----------------------------------------------------------------
footer:
  left:  "scrollytelling theme"
  right: "Copyright 2026"

# ---- Jekyll plumbing -------------------------------------------------------
# Compatible with the github-pages gem; no plugins beyond GH Pages allow-list.
plugins:
  - jekyll-seo-tag
  - jekyll-sitemap

permalink: pretty

# ---- Collections -----------------------------------------------------------
# `chapters`: drafted chapters and the preface at /chapters/<slug>/
collections:
  chapters:
    output: true
    permalink: /chapters/:path/

# Default layouts per scope. Pages at the root pick up `default`; chapter
# collection items mount the React scrollytelling shell.
defaults:
  - scope: { path: "" }
    values:
      layout: "default"
  - scope: { path: "", type: "chapters" }
    values:
      layout: "scrolly"
      page_kind: "chapter"
  - scope: { path: "pages" }
    values:
      layout: "page"

exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - MAINTAINERS.md
  - CLAUDE.md
  - scripts
  - node_modules
