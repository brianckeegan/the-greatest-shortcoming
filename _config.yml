# ============================================================================
# greatest-shortcoming · scrollytelling book site
# ============================================================================
# One unified design across every page. The homepage and each chapter page
# mount the same React shell at /assets/js/app.jsx; static pages share the
# same chrome rendered as plain HTML. Design tokens live in
# assets/css/scrolly.css → _sass/tgs.scss.
#
# Edit this file to retitle, recolor, and rewire. Add chapters in
# _data/chapters.yml. Add network entities under _data/{people,orgs,...}.yml.

# ---- Site identity ---------------------------------------------------------
title: "The Greatest Shortcoming"
subtitle: "Quantitative Chauvinism and Ecofascist Imaginaries"
author: "Brian C. Keegan"
description: >-
  How a community abstracts its anxieties about disorder, contamination, and
  change into technical problems subject to "objective" numerical analysis —
  and how those quantitative logics travel from progressive city councils to
  the journals of white nationalists.
url: "https://www.thegreatestshortcoming.com"           # e.g. "https://brianckeegan.github.io"
baseurl: ""       # e.g. "/the-greatest-shortcoming" if deploying under a path
lang: en
# To set a custom domain: create a CNAME file at the repo root with the domain
# (e.g. greatestshortcoming.com), then enable HTTPS under Settings → Pages.
status_line: "in progress"

# ---- Hero (homepage) -------------------------------------------------------
hero:
  title_lines: ["The Greatest Shortcoming"]
  deck: >-
    How a community abstracts its anxieties about disorder, contamination, and
    change into technical problems subject to "objective" numerical analysis —
    and how those quantitative logics travel from progressive city councils to
    the journals of white nationalists.
  scroll_cue: "scroll to begin"

# ---- Top-level navigation (static-page header) -----------------------------
# Used by _includes/header.html on /about/, /contents/, /bibliography/, /news/,
# /draft-status/. The React shell on the homepage and chapter pages renders
# its own nav from `nav_reading` further down.
nav:
  - { label: "Contents",     url: "/contents/" }
  - { label: "Preface",      url: "/chapters/preface/" }
  - { label: "About",        url: "/about/" }
  - { label: "News",         url: "/news/" }

# ---- Scrollytelling navigation (used by the React app on home + chapters) --
# This list is NAVIGATION ONLY. It does not determine the order in which
# landing-page items render — that is controlled exclusively by `sort_order`
# in each `_landing/<id>.md` file. Anchor entries here flagged `nav_only: true`
# are pure jump-to-id menu links; they have zero effect on page-flow ordering.
nav_reading:
  # `kind: parts-menu` renders the navbar dropdown of every part. The `label`
  # field is what the user sees on the menu button — keep it as "Eras" for
  # this site, or rename to "Parts", "Chapters", "Acts", etc.
  - { label: "Eras", kind: "parts-menu" }
  - { label: "Matrix", url: "#qc-efi-matrix", nav_only: true }
  - { label: "Book",   url: "#book",          nav_only: true }
  - { label: "Author", url: "#author",        nav_only: true }
  - { label: "News",   url: "#news",          nav_only: true }

# ---- Landing-page items ----------------------------------------------------
# Item content lives in `_landing/<id>.md` as Markdown + YAML frontmatter,
# not inline here. Each file's frontmatter declares:
#
#   kind        — coda | register | news | epigraphs | island   (renderer)
#   sort_order  — integer; lower numbers render first.   THE ONLY ORDER SOURCE.
#   home_only   — optional bool; when true, item is hidden on chapter pages.
#   kicker      — small overline above the title (optional)
#   title       — heading (optional for `news`/`epigraphs`)
#   items       — for `kind: epigraphs`, a list of {quote, cite}
#   island      — for `kind: island`, the window global to render
#
# Reserved sort_order values (defined in assets/js/app.jsx; the React app
# interleaves these structural elements between landing items by sort_order):
#
#   200 — eras stepper (the QC | parts | EFI navbar stepper)
#   300 — scrolly figure (the network SVG)
#
# So an item with sort_order < 200 renders before the stepper; sort_order
# 201–299 renders between stepper and figure; sort_order 301+ renders below
# the figure. Conventional spacing: number items in steps of 10 or 50 so new
# items can slot in without renumbering.
#
# To add a new landing item:  drop a file in `_landing/`, set `sort_order:`,
# and (optionally) add a `nav_reading` jump-link entry above with
# `nav_only: true`.

# ---- Theme tokens (overridable knobs) --------------------------------------
theme_defaults:
  theme: "cool"      # "warm" | "ivory" | "cool"
  net: "rough"       # "rough" | "clean"
  fontSize: 20

# ---- Footer ----------------------------------------------------------------
footer:
  left:  "scrollytelling theme"
  right: "Copyright 2026"

# ---- Jekyll plumbing -------------------------------------------------------
# Compatible with the github-pages gem; no plugins beyond GH Pages allow-list.
plugins:
  - jekyll-seo-tag
  - jekyll-sitemap

permalink: pretty

# ---- Collections -----------------------------------------------------------
# `chapters`: drafted chapters and the preface at /chapters/<slug>/
# `landing`:  landing-page item content (book / author / register defs /
#             news / resources / epigraphs / matrix). Not output as
#             standalone pages — rendered into the React shell via
#             _includes/site-data.html in `sort_order` order.
collections:
  chapters:
    output: true
    permalink: /chapters/:path/
  landing:
    output: false

# Default layouts per scope. Pages at the root pick up `default`; chapter
# collection items mount the React scrollytelling shell. Landing items
# inherit nothing — they are read as data, not rendered as pages.
defaults:
  - scope: { path: "" }
    values:
      layout: "default"
  - scope: { path: "", type: "chapters" }
    values:
      layout: "scrolly"
      page_kind: "chapter"
  - scope: { path: "pages" }
    values:
      layout: "page"

exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - MAINTAINERS.md
  - CLAUDE.md
  - scripts
  - node_modules
