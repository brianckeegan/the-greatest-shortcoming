# ============================================================================
# greatest-shortcoming · book site
# ============================================================================
# Server-rendered Jekyll site styled with Tailwind CSS (built via Vite in CI).
# Layouts: _layouts/home.html (landing) · _layouts/chapter.html (long-form) ·
# _layouts/default.html / page.html (static). Tailwind tokens live in
# tailwind.config.js; component recipes in assets/css/src/main.css.
#
# Edit this file to retitle, recolor, and rewire. Chapter content lives in
# _chapters/*.md; landing-item content in _landing/*.md.

# ---- Site identity ---------------------------------------------------------
title: "The Greatest Shortcoming"
subtitle: "Quantitative Chauvinism and Ecofascist Imaginaries"
author: "Brian C. Keegan"
description: >-
  How a community abstracts its anxieties about disorder, contamination, and
  change into technical problems subject to "objective" numerical analysis —
  and how those quantitative logics travel from progressive city councils to
  the journals of white nationalists.
url: "https://www.thegreatestshortcoming.com"
baseurl: ""
lang: en
# To set a custom domain: create a CNAME file at the repo root with the domain
# (e.g. greatestshortcoming.com), then enable HTTPS under Settings → Pages.
status_line: "in progress"

# ---- Feature flags ---------------------------------------------------------
# The scrollytelling network and the QC×EFI matrix are paused. All source
# files remain in the repo (assets/js/islands/**, assets/js/dist/islands.js,
# _data/scrolly/*.yml, assets/css/scrolly-network.css) — flip features.network
# to true and add the network mount include to a layout to revive it.
features:
  network: false

# ---- Hero (homepage) -------------------------------------------------------
hero:
  title_lines: ["The Greatest Shortcoming"]
  deck: >-
    How a community abstracts its anxieties about disorder, contamination, and
    change into technical problems subject to "objective" numerical analysis —
    and how those quantitative logics travel from progressive city councils to
    the journals of white nationalists.
  scroll_cue: "scroll to begin"

# ---- Top-level navigation --------------------------------------------------
# Used by _includes/header.html across every page.
nav:
  - { label: "Contents",     url: "/contents/" }
  - { label: "Preface",      url: "/chapters/preface/" }
  - { label: "About",        url: "/about/" }
  - { label: "News",         url: "/news/" }

# ---- Landing-page items ----------------------------------------------------
# Each _landing/<id>.md declares (in YAML frontmatter):
#
#   kind        — coda | register | news | epigraphs | island   (renderer)
#   sort_order  — integer; lower numbers render first within a kind-section.
#   home_only   — optional; reserved for future use.
#   kicker      — small overline above the title (optional)
#   title       — heading (optional for `news`/`epigraphs`)
#   items       — for `kind: epigraphs`, a list of {quote, cite}
#   island      — for `kind: island`, the window global to render
#                  (only rendered when features.network: true).
#
# _layouts/home.html groups landing items by `kind` into numbered sections
# after the Parts/Chapters sections — see _layouts/home.html for the exact
# section order (book, author, epigraphs, coda, news, resources, island).

# ---- Footer ----------------------------------------------------------------
footer:
  left:  "scrollytelling theme"
  right: "Copyright 2026"

# ---- Jekyll plumbing -------------------------------------------------------
# Compatible with the github-pages gem; no plugins beyond GH Pages allow-list.
plugins:
  - jekyll-seo-tag
  - jekyll-sitemap

permalink: pretty

# ---- Collections -----------------------------------------------------------
# `chapters`: drafted chapters and the preface at /chapters/<slug>/
# `landing`:  landing-page item content (book / author / register defs /
#             news / resources / epigraphs / island). Read as data by
#             _layouts/home.html; not output as standalone pages.
collections:
  chapters:
    output: true
    permalink: /chapters/:path/
  landing:
    output: false

defaults:
  - scope: { path: "" }
    values:
      layout: "default"
  - scope: { path: "", type: "chapters" }
    values:
      layout: "chapter"
      page_kind: "chapter"
  - scope: { path: "pages" }
    values:
      layout: "page"

exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - MAINTAINERS.md
  - CLAUDE.md
  - scripts
  - node_modules
  - package.json
  - package-lock.json
  - vite.config.js
  - tailwind.config.js
  - postcss.config.js
  - assets/css/src
  - esbuild.config.mjs
  - tsconfig.json
