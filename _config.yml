# ============================================================================
# greatest-shortcoming · scrollytelling book site
# ============================================================================
# One unified design across every page. The homepage and each chapter page
# mount the same React shell at /assets/js/app.jsx; static pages share the
# same chrome rendered as plain HTML. Design tokens live in
# assets/css/scrolly.css → _sass/tgs.scss.
#
# Edit this file to retitle, recolor, and rewire. Add chapters in
# _data/chapters.yml. Add network entities under _data/{people,orgs,...}.yml.

# ---- Site identity ---------------------------------------------------------
title: "The Greatest Shortcoming"
subtitle: "Quantitative Chauvinism and Ecofascist Imaginaries"
author: "Brian C. Keegan"
description: >-
  How a community abstracts its anxieties about disorder, contamination, and
  change into technical problems subject to "objective" numerical analysis —
  and how those quantitative logics travel from progressive city councils to
  the journals of white nationalists.
url: "https://www.thegreatestshortcoming.com"           # e.g. "https://brianckeegan.github.io"
baseurl: ""       # e.g. "/the-greatest-shortcoming" if deploying under a path
lang: en
# To set a custom domain: create a CNAME file at the repo root with the domain
# (e.g. greatestshortcoming.com), then enable HTTPS under Settings → Pages.
status_line: "in progress"

# ---- Hero (homepage) -------------------------------------------------------
hero:
  title_lines: ["The Greatest Shortcoming"]
  deck: >-
    How a community abstracts its anxieties about disorder, contamination, and
    change into technical problems subject to "objective" numerical analysis —
    and how those quantitative logics travel from progressive city councils to
    the journals of white nationalists.
  scroll_cue: "scroll to begin"

# ---- Top-level navigation (static-page header) -----------------------------
# Used by _includes/header.html on /about/, /contents/, /bibliography/, /news/,
# /draft-status/. The React shell on the homepage and chapter pages renders
# its own nav from `nav_reading` further down.
nav:
  - { label: "Contents",     url: "/contents/" }
  - { label: "Preface",      url: "/chapters/preface/" }
  - { label: "About",        url: "/about/" }
  - { label: "News",         url: "/news/" }

# ---- Scrollytelling navigation (used by the React app on home + chapters) --
nav_reading:
  # `kind: parts-menu` renders the navbar dropdown of every part. The `label`
  # field is what the user sees on the menu button — keep it as "Eras" for
  # this site, or rename to "Parts", "Chapters", "Acts", etc.
  - { label: "Eras", kind: "parts-menu" }
  - { label: "Book", url: "#book" }
  - { label: "Author", url: "#author" }
  - { label: "News", url: "#news" }

# ---- Landing-page sections -------------------------------------------------
# Section content lives in `_sections/<id>.md` as Markdown + YAML frontmatter,
# not inline here. Each section file's frontmatter declares:
#
#   kind     — register | coda | news | epigraphs   (selects the React renderer)
#   slot     — pre-stepper | pre-scrolly | post-scrolly | post-coda  (placement)
#   kicker   — small overline above the title (optional)
#   title    — section heading (optional for `news`/`epigraphs`)
#   items    — for `kind: epigraphs`, a list of {quote, cite}
#
# The section's body is the Markdown (or HTML) under the frontmatter.
#
# WITHIN each slot, render order is driven by `nav_reading` below: any
# `nav_reading` entry of the form `{ url: "#some-id" }` puts the section
# whose filename matches `some-id` at that position. Sections not referenced
# in `nav_reading` render after the named ones, in collection natural order
# (alphabetical by filename).
#
# To add a new section:  drop a file in `_sections/`, set frontmatter, and
# (optionally) add an entry to `nav_reading` to control where it lands within
# its slot.

# ---- Theme tokens (overridable knobs) --------------------------------------
theme_defaults:
  theme: "cool"      # "warm" | "ivory" | "cool"
  net: "rough"       # "rough" | "clean"
  fontSize: 20

# ---- Footer ----------------------------------------------------------------
footer:
  left:  "scrollytelling theme"
  right: "Copyright 2026"

# ---- Jekyll plumbing -------------------------------------------------------
# Compatible with the github-pages gem; no plugins beyond GH Pages allow-list.
plugins:
  - jekyll-seo-tag
  - jekyll-sitemap

permalink: pretty

# ---- Collections -----------------------------------------------------------
# `chapters`: drafted chapters and the preface at /chapters/<slug>/
# `sections`: landing-page section content (book / author / register defs /
#             news / resources / epigraphs). Not output as standalone pages —
#             rendered into the React shell via _includes/site-data.html.
collections:
  chapters:
    output: true
    permalink: /chapters/:path/
  sections:
    output: false

# Default layouts per scope. Pages at the root pick up `default`; chapter
# collection items mount the React scrollytelling shell. Sections inherit
# nothing — they are read as data, not rendered as pages.
defaults:
  - scope: { path: "" }
    values:
      layout: "default"
  - scope: { path: "", type: "chapters" }
    values:
      layout: "scrolly"
      page_kind: "chapter"
  - scope: { path: "pages" }
    values:
      layout: "page"

exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - MAINTAINERS.md
  - CLAUDE.md
  - scripts
  - node_modules
