# ============================================================================
# greatest-shortcoming · a Jekyll theme for book / network-reading websites
# ============================================================================
# This site is built with Jekyll and deploys to GitHub Pages out of the box.
# Edit this file to retitle, recolor, and rewire the site without touching code.
# Add or edit entities under `_data/` to grow the network.

# ---- Site identity ---------------------------------------------------------
title: "The Greatest Shortcoming"
subtitle: "a network reading"
description: >-
  How a community abstracts its anxieties about disorder, contamination, and
  change into technical problems subject to "objective" numerical analysis —
  and how those quantitative logics travel from progressive city councils to
  the journals of white nationalists.
url: ""           # e.g. "https://username.github.io"
baseurl: ""       # e.g. "/greatest-shortcoming" if deploying under a path
lang: en

# ---- Hero (homepage) -------------------------------------------------------
hero:
  title_lines: ["The Greatest", "Shortcoming"]
  deck: >-
    How a community abstracts its anxieties about disorder, contamination, and
    change into technical problems subject to "objective" numerical analysis —
    and how those quantitative logics travel from progressive city councils to
    the journals of white nationalists. Five eras. One mechanism.
  scroll_cue: "scroll to begin"

# ---- Top-level navigation --------------------------------------------------
# Rendered in the brandbar (landing + home) and in header.html (content pages).
# The brand on the upper left always returns to the home hub (/home.html); these
# are the buttons beside it. Concepts/Chapters jump to sections on the home hub.
nav:
  - { label: "Concepts", url: "/home.html#concepts" }
  - { label: "Chapters", url: "/home.html#chapters" }
  - { label: "About", url: "/home.html#about" }

# ---- Two analytical registers (definition bars beneath the hero) -----------
registers:
  - id: "quant-chauvinism"
    kicker: "epistemic register · i"
    title: "Quantitative Chauvinism"
    body: >-
      <em>n.</em> A political operation: the deployment of numerical
      instruments to foreclose political deliberation by converting contested
      claims into apparent technical necessities. It operates through three
      reinforcing patterns — the <b>will to simplify</b> (compressing complex
      social processes into a single governing metric), the <b>rule of
      expertise</b> (insulating quantified claims from democratic scrutiny
      through credentialed authority), and the <b>politics of inevitability</b>
      (converting conditional projections into mandates that foreclose
      political choice).
  - id: "lebensraum-imaginaries"
    kicker: "political register · ii"
    title: "Lebensraum Imaginaries"
    body: >-
      <em>n.</em> A recurring epistemic architecture within ecofascism:
      organized visions of environmental futures that naturalize hierarchy and
      exclusion as ecological necessity. Three constitutive features: ecological
      crisis as the ground for <b>palingenetic purification</b> (national
      rebirth from decadence); demographic content given to that contamination
      (the wrong bodies, the wrong fertility); and the <b>coercive sorting of
      populations</b> authorized as stewardship rather than violence.
      <b>Lebensraum</b> is a deliberate reference to a concept crossing
      biological, ecological, social, and political boundaries — one that
      animated the calamities of the Third Reich but has longer roots and more
      unsettling afterlives.

# ---- Coda sections (after the scrollytelling) ------------------------------
# Each becomes an in-page section AND can be expanded as its own page later.
coda:
  - id: "book"
    kicker: "about"
    title: "The Book"
    body: >-
      <i>The Greatest Shortcoming</i> traces a hundred years of American
      demographic and environmental governance through five eras — from the
      Olmsted Report's grammar of scarcity to climate triage as administrative
      routine. It identifies the actors who built the instruments, the
      organizations that circulated them, the metaphors that made them
      persuasive, and the political projects they served. And it asks whether
      measurement can be redirected: whether the same quantitative tools that
      narrowed the circle of concern can be rebuilt to widen it.
  - id: "author"
    kicker: "about"
    title: "The Author"
    body: >-
      <span style="color:var(--ink-soft);font-style:italic">↳ Author bio
      placeholder — edit <code>_config.yml</code> to replace.</span>
  - id: "resources"
    kicker: "further"
    title: "Resources"
    body: >-
      Selected works referenced in chapter 1: Theodore Porter, <i>Trust in
      Numbers</i>; Alain Desrosières, <i>The Politics of Large Numbers</i>;
      Hannah Arendt, <i>The Origins of Totalitarianism</i>; Matthew Connelly,
      <i>Fatal Misconception</i>; Emily Klancher Merchant, <i>Building the
      Population Bomb</i>; Betsy Hartmann, <i>Reproductive Rights and
      Wrongs</i>; Sheila Jasanoff &amp; Sang-Hyun Kim, <i>Dreamscapes of
      Modernity</i>; Roger Griffin on palingenetic ultranationalism.

# ---- Theme tokens (overridable knobs) --------------------------------------
theme_defaults:
  theme: "cool"      # "warm" | "ivory" | "cool"
  net: "rough"       # "rough" | "clean"
  fontSize: 18

# ---- Footer ----------------------------------------------------------------
footer:
  left:  "The Greatest Shortcoming · ch. 1 Boulder · network reading"
  right: "scroll-driven"

# ---- Jekyll plumbing -------------------------------------------------------
# Standalone Jekyll 4 (see Gemfile). Use kramdown with GFM input so markdown
# renders as it did under the former github-pages gem.
plugins:
  - jekyll-redirect-from
  - jekyll-seo-tag
  - jekyll-sitemap

markdown: kramdown
kramdown:
  input: GFM

permalink: pretty

exclude:
  - Gemfile
  - Gemfile.lock
  - vendor/          # bundler-cache installs gems here in CI; Jekyll must not scan it
  - .bundle/
  - README.md
  - node_modules
  - package.json
  - package-lock.json
  - tailwind.config.js

collections:
  chapters:
    output: true
    permalink: /chapters/:path/
  landing:
    output: false

defaults:
  - scope: { path: "" }
    values:
      layout: "default"
  - scope: { path: "", type: "chapters" }
    values:
      layout: "chapter"
  - scope: { path: "", type: "landing" }
    values:
      layout: null
