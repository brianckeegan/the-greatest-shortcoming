# Keeps the build toolchain current so the site stays buildable over time.
# Grouped, low-frequency PRs; each is validated by the Pages build job before
# it can be merged.
version: 2
updates:
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: monthly
    groups:
      actions:
        patterns: ["*"]
    commit-message:
      prefix: ci

  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: monthly
    groups:
      npm:
        patterns: ["*"]
    commit-message:
      prefix: deps

  - package-ecosystem: bundler
    directory: "/"
    schedule:
      interval: monthly
    groups:
      bundler:
        patterns: ["*"]
    commit-message:
      prefix: deps
