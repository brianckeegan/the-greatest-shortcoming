# Parts drive both the timeline navigation (the stepper) and the scrolly
# figure's per-step prose.
#
# Two `kind` values:
#   step    — a chapter-level part (Boulder, Free Fall, …). The scrolly
#             figure pulls prose for these; the stepper renders them as
#             numbered stops with year ranges.
#   bracket — a flanking marker (an analytical register like QC or EFI).
#             Renders in the stepper as a single-label stop but isn't a
#             scrolly step.
#
# Stepper visual customization (per item, optional):
#   color             CSS color token to accent this stop (no `--` prefix);
#                     defaults to `ink` for steps and `tufte-red` for
#                     brackets.
#   bracket_line      true → render the connecting bracket-line ornament.
#   underline_active  true → underline the label when this stop is the
#                     active scroll position. Defaults to true; set to
#                     false to suppress the bar for any individual stop.
#
# The step-kind subtitle (year range) is derived from `start` + `end` in
# _includes/page-context.html (en dash with spaces). Don't add a `subtitle:`
# field unless an item genuinely needs free-form text (e.g. "circa 1900").

# ---- Bracket: opening register ---------------------------------------------
- id: quant-chauvinism
  kind: bracket
  label: "Quantitative chauvinism"
  short_label: "QC"
  color: tufte-red
  bracket_line: true
  underline_active: true

