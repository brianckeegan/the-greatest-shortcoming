- id: olmsted_jr
  name: "Frederick Law Olmsted Jr."
  role: "Landscape architect"
  dates: "1870–1957"
  era: [prelude]
  blurb: >-
    Authored the 1910 Boulder report; codified a grammar of scarcity and urgency that
    subordinated private property rights to a collectively defined vision of community character.
  links: [olmsted_report, chautauqua, blue_line, will_to_simplify]

- id: bartlett
  name: "Albert Bartlett"
  role: "Nuclear physicist · CU Boulder"
  dates: "1923–2013"
  era: [free_fall, quarantine]
  blurb: >-
    Manhattan Project alum who spent half a century translating exponential mathematics of
    radioactivity into a persuasive template about the consequences of growth. Co-instigator
    of the Blue Line.
  links: [mckelvey, plan_boulder, blue_line, exponential_curve, will_to_simplify, bartlett_lecture, cu_boulder, los_alamos]

- id: mckelvey
  name: "Bob McKelvey"
  role: "Mathematics · CU Boulder"
  dates: "fl. 1958"
  era: [free_fall]
  blurb: "In 1958 told Bartlett that something had to be done about the foothills. Co-instigator of PLAN-Boulder."
  links: [bartlett, plan_boulder, blue_line, cu_boulder]

- id: porter
