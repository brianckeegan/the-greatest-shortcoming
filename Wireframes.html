<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&family=Kalam:wght@300;400;700&family=EB+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1a1a1a;
    --paper: #f5f1e8;
    --paper-dim: #ebe5d6;
    --pencil: #4a4a4a;
    --pencil-light: #8a8a8a;
    --accent-red: #c1432b;
    --accent-blue: #2a5a8a;
    --accent-yellow: #e8c547;
  }
  body { background: var(--paper); color: var(--ink); font-family: 'EB Garamond', serif; margin: 0; }
  .sketch-font { font-family: 'Kalam', cursive; }
  .hand { font-family: 'Caveat', cursive; }
  .mono { font-family: 'JetBrains Mono', monospace; }

  /* Sketchy borders using SVG filters */
  .sketchy {
    border: 1.5px solid var(--ink);
    border-radius: 2px;
    position: relative;
  }
  .sketchy-thin { border: 1px solid var(--pencil); }
  .sketchy-dashed { border: 1.5px dashed var(--pencil); }

  .annotation {
    font-family: 'Caveat', cursive;
    font-size: 18px;
    color: var(--accent-red);
    line-height: 1.1;
  }
  .arrow {
    font-family: 'Caveat', cursive;
    color: var(--accent-red);
    font-size: 20px;
  }

  /* Network node shapes */
  .node-person { border-radius: 50%; }
  .node-org { border-radius: 4px; }
  .node-theme { transform: rotate(45deg); }

  /* Common page reset for artboards */
  .ab-root { font-family: 'EB Garamond', serif; background: var(--paper); color: var(--ink); width: 100%; height: 100%; padding: 24px; box-sizing: border-box; overflow: hidden; }
  .ab-title { font-family: 'Kalam', cursive; font-weight: 700; font-size: 22px; margin: 0 0 4px; }
  .ab-sub { font-family: 'Caveat'; color: var(--pencil); font-size: 16px; margin: 0 0 18px; }

  /* placeholder lines */
  .lines { display: flex; flex-direction: column; gap: 4px; }
  .lines i { display: block; height: 6px; background: var(--pencil-light); opacity: .35; border-radius: 2px; }
  .lines i:nth-child(2) { width: 92%; }
  .lines i:nth-child(3) { width: 78%; }
  .lines i:nth-child(4) { width: 88%; }

  /* sketchy badge */
  .pill { display: inline-block; padding: 2px 8px; border: 1px solid var(--ink); border-radius: 999px; font-size: 11px; font-family: 'JetBrains Mono'; background: var(--paper-dim); }

  /* timeline rail */
  .rail { position: relative; height: 2px; background: var(--ink); }
  .rail::before, .rail::after { content: ''; position: absolute; top: -3px; width: 8px; height: 8px; background: var(--ink); border-radius: 50%; }
  .rail::before { left: 0; }
  .rail::after { right: 0; }

  /* Mobile frame */
  .phone {
    width: 280px; height: 560px; border: 2px solid var(--ink); border-radius: 28px;
    background: var(--paper); padding: 14px 12px; box-sizing: border-box;
    position: relative; box-shadow: 4px 4px 0 var(--pencil-light);
  }
  .phone::before {
    content: ''; position: absolute; top: 8px; left: 50%; transform: translateX(-50%);
    width: 60px; height: 4px; background: var(--ink); border-radius: 2px;
  }
  .phone-screen { width: 100%; height: 100%; padding-top: 12px; box-sizing: border-box; overflow: hidden; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>

<script type="text/babel">

/* ---------------- Reusable network primitives ---------------- */

// A scrappy, hand-drawn-feeling network sketch in SVG
const NetworkSketch = ({ w = 520, h = 320, variant = 'a' }) => {
  // Different node layouts
  const layouts = {
    a: [
      { id: 'olmsted', x: 120, y: 80, t: 'Olmsted Jr.', kind: 'person' },
      { id: 'bartlett', x: 380, y: 90, t: 'Bartlett', kind: 'person' },
      { id: 'mckelvey', x: 280, y: 50, t: 'McKelvey', kind: 'person' },
      { id: 'plan', x: 420, y: 200, t: 'PLAN-Boulder', kind: 'org' },
      { id: 'cu', x: 200, y: 230, t: 'CU Boulder', kind: 'org' },
      { id: 'chautauqua', x: 80, y: 220, t: 'Chautauqua', kind: 'org' },
      { id: 'blueline', x: 320, y: 260, t: 'Blue Line', kind: 'theme' },
      { id: 'expo', x: 460, y: 130, t: 'exponential curve', kind: 'theme' },
    ],
    b: [
      { id: 'a', x: 100, y: 60, t: 'Free Fall', kind: 'theme' },
      { id: 'b', x: 250, y: 110, t: 'Quarantine', kind: 'theme' },
      { id: 'c', x: 380, y: 70, t: 'Swarm', kind: 'theme' },
      { id: 'd', x: 150, y: 220, t: 'carrying capacity', kind: 'theme' },
      { id: 'e', x: 320, y: 240, t: 'fiscal impact', kind: 'theme' },
      { id: 'f', x: 460, y: 200, t: 'replacement', kind: 'theme' },
    ],
  };
  const nodes = layouts[variant] || layouts.a;
  const edges = variant === 'a' ?
    [['olmsted','chautauqua'],['olmsted','bartlett'],['mckelvey','bartlett'],['bartlett','plan'],['plan','blueline'],['cu','bartlett'],['bartlett','expo'],['olmsted','blueline']] :
    [['a','b'],['b','c'],['a','d'],['b','e'],['c','f'],['d','e'],['e','f']];

  const findNode = (id) => nodes.find(n => n.id === id);
  const shape = (kind) => {
    if (kind === 'person') return <circle r="14" fill="#f5f1e8" stroke="#1a1a1a" strokeWidth="1.5" />;
    if (kind === 'org') return <rect x="-15" y="-12" width="30" height="24" fill="#f5f1e8" stroke="#1a1a1a" strokeWidth="1.5" />;
    return <polygon points="0,-15 15,0 0,15 -15,0" fill="#f5f1e8" stroke="#1a1a1a" strokeWidth="1.5" />;
  };

  return (
    <svg viewBox={`0 0 ${w} ${h}`} width="100%" style={{ display:'block' }}>
      <defs>
        <filter id="rough">
          <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="2" />
          <feDisplacementMap in="SourceGraphic" scale="1.5" />
        </filter>
      </defs>
      {edges.map(([a,b],i) => {
        const A = findNode(a), B = findNode(b);
        if (!A || !B) return null;
        const mx = (A.x+B.x)/2 + (i%2?8:-8);
        const my = (A.y+B.y)/2 + (i%2?-8:8);
        return <path key={i} d={`M${A.x} ${A.y} Q ${mx} ${my} ${B.x} ${B.y}`} stroke="#4a4a4a" strokeWidth="1" fill="none" opacity="0.6" />;
      })}
      {nodes.map(n => (
        <g key={n.id} transform={`translate(${n.x},${n.y})`}>
          {shape(n.kind)}
          <text y="32" textAnchor="middle" fontFamily="Kalam" fontSize="12" fill="#1a1a1a">{n.t}</text>
        </g>
      ))}
    </svg>
  );
};
